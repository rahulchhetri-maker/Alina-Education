<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <h2>Create account</h2>
    <form action="">
        <label class="un" for="">User name</label> 
        <br>
        <input class="untext" type="text" required>
        <br>
        <label class="email" for="">Email</label>
        <br>
        <input class="emailtext" type="text" required>
        <br>
        <label class="pass" for="">Password</label>
        <br>
        <input class="passtext" type="text" required>
        <br>
        <button class="signup ">Sign up</button>
        <br>
        <button class="googlelogin"><img src="google.png" alt="" class="google">Continue with Google</button>
        <p class="ask">Already have an account? <a class="login" href="login.html">Log in</a></p>
    </form>
</body>
</html>
